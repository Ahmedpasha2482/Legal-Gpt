version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: criminal-law-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: criminal_law_password_2024
      MONGO_INITDB_DATABASE: criminal_law_chatbot
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - criminal-law-network

  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: criminal-law-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:criminal_law_password_2024@mongodb:27017/criminal_law_chatbot?authSource=admin
      
      # AI API Keys (Set these in .env file)
      GROK_API_KEY: ${GROK_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      
      # Vector Database (Optional)
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME}
      
      # Security
      JWT_SECRET: ${JWT_SECRET:-criminal_law_super_secret_jwt_key_2024}
      JWT_EXPIRE: 7d
      BCRYPT_ROUNDS: 12
      
      # File Upload
      MAX_FILE_SIZE: 50MB
      ALLOWED_FILE_TYPES: pdf,txt,doc,docx
      
      # Rate Limiting
      RATE_LIMIT_WINDOW: 15
      RATE_LIMIT_MAX_REQUESTS: 100
      
      # CORS
      FRONTEND_URL: http://localhost:5000
    volumes:
      - ./Data:/app/Data:ro
      - app_uploads:/app/server/uploads
    depends_on:
      - mongodb
    networks:
      - criminal-law-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Redis (Optional - for caching and session storage)
  redis:
    image: redis:7.2-alpine
    container_name: criminal-law-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - criminal-law-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-criminal_law_redis_2024}

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: criminal-law-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - criminal-law-network
    profiles:
      - production

# Named volumes for persistent data
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local

# Custom network
networks:
  criminal-law-network:
    driver: bridge

# Development override (docker-compose.override.yml)
---
# This section is for development mode
# Create a docker-compose.override.yml file for development-specific configurations